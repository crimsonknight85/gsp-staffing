services:
  - type: web
    name: gsp-platform
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ID
        sync: false
      - key: APP_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: KIMI_AUTH_URL
        sync: false
      - key: KIMI_OPEN_URL
        sync: false
      - key: OWNER_UNION_ID
        sync: false
